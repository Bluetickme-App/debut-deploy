      - generic [ref=f4e17]: Effective 3 July 2026 · Version 0.1
    - generic [ref=f4e18]:
      - img [ref=f4e19]
      - generic [ref=f4e21]:
        - strong [ref=f4e22]: Draft — not yet legal advice.
        - text: This document is a good-faith starting point written for DebutDeploy's actual setup. Have it reviewed by a qualified solicitor before you rely on it. Placeholders in
        - code [ref=f4e23]: "[brackets]"
        - text: (legal entity, registered address, tax numbers) must be completed.
    - heading "1. Roles" [level=2] [ref=f4e24]
    - paragraph [ref=f4e25]:
      - text: When you deploy applications and databases, they may contain personal data of your own users. For that data you are the
      - strong [ref=f4e26]: controller
      - text: and DebutDeploy is your
      - strong [ref=f4e27]: processor
      - text: . This Addendum ("DPA") applies to that processing and supplements our
      - link "Terms of Service" [ref=f4e28] [cursor=pointer]:
        - /url: /terms.html
      - text: . Where UK GDPR or EU GDPR applies, this DPA is intended to satisfy Article 28.
    - heading "2. Scope of processing" [level=2] [ref=f4e29]
    - paragraph [ref=f4e30]:
      - strong [ref=f4e31]: "Subject matter:"
      - text: hosting and operating your applications and databases.
      - strong [ref=f4e32]: "Duration:"
      - text: for the term of your account.
      - strong [ref=f4e33]: "Nature and purpose:"
      - text: storage, compute, backup, and transmission as directed by you through the Service.
      - strong [ref=f4e34]: "Data types and subjects:"
      - text: determined by you — whatever your workloads contain.
    - heading "3. Our commitments" [level=2] [ref=f4e35]
    - list [ref=f4e36]:
      - listitem [ref=f4e37]: Process personal data only on your documented instructions (using the Service is your instruction).
      - listitem [ref=f4e38]: Ensure people authorised to process it are under confidentiality obligations.
      - listitem [ref=f4e39]:
        - text: Apply appropriate technical and organisational security measures (see
        - link "Security" [ref=f4e40] [cursor=pointer]:
          - /url: /security.html
        - text: ).
      - listitem [ref=f4e41]: Assist you, so far as reasonable, with data subject requests, security, breach notification, and DPIAs.
      - listitem [ref=f4e42]: Notify you without undue delay after becoming aware of a personal data breach affecting your data.
      - listitem [ref=f4e43]: Delete or return personal data at the end of the service, subject to legal retention.
      - listitem [ref=f4e44]: Make available information needed to demonstrate compliance.
    - heading "4. Subprocessors" [level=2] [ref=f4e45]
    - paragraph [ref=f4e46]: You authorise us to use the subprocessors below to deliver the Service. We remain responsible for their performance and will give notice before adding a new one so you can object on reasonable data-protection grounds.
