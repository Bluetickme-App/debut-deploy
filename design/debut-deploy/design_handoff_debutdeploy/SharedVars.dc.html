<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<dc-import name="AppShell" active-nav="sharedvars" crumb="Variable Groups" theme="{{ theme }}" admin="{{ true }}" hint-size="100%,820px">
  <div style="padding:26px 30px 44px; max-width:1000px">

    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:20px; margin-bottom:22px">
      <div>
        <h1 style="margin:0 0 4px; font-family:'Geist',sans-serif; font-size:25px; font-weight:600; letter-spacing:-.01em; color:var(--text)">Variable Groups</h1>
        <p style="margin:0; font-size:13.5px; color:var(--text-muted)">Reusable sets of environment variables you can attach to any service.</p>
      </div>
      <div style="display:flex; gap:9px">
        <button onClick="{{ toggleReveal }}" style="{{ s.btnSecondary }}" style-hover="{background:'var(--surface-2)'}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>{{ revealLabel }}</button>
        <button onClick="{{ toggleCreate }}" style="{{ s.btnPrimary }}" style-hover="{background:'var(--accent-hover)'}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>New Group</button>
      </div>
    </div>

    <sc-if value="{{ creating }}" hint-placeholder-val="{{ false }}">
      <div style="border:1px solid var(--accent); border-radius:13px; background:var(--surface); box-shadow:var(--shadow); padding:20px 22px; margin-bottom:18px">
        <h3 style="margin:0 0 16px; font-size:15px; font-weight:600; color:var(--text)">New variable group</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px">
          <div><label style="{{ s.label }}">Group name</label><input placeholder="e.g. payments-secrets" style="{{ s.inputMono }}" style-focus="{borderColor:'var(--accent)', boxShadow:'0 0 0 3px var(--ring)'}"/></div>
          <div><label style="{{ s.label }}">Scope</label><div style="position:relative"><select style="{{ s.select }}"><option>Global — all projects</option><option>Project: mflh</option><option>Project: data-platform</option></select><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position:absolute; right:11px; top:50%; transform:translateY(-50%); pointer-events:none"><path d="m6 9 6 6 6-6"/></svg></div></div>
        </div>
        <label style="{{ s.label }}">Variables</label>
        <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:12px">
          <div style="display:grid; grid-template-columns:1fr 1.4fr 92px; gap:10px; align-items:center"><input placeholder="KEY" style="{{ s.inputMono }}"/><input placeholder="value" style="{{ s.inputMono }}"/><label style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); cursor:pointer"><input type="checkbox" style="accent-color:var(--accent)"/>Secret</label></div>
          <div style="display:grid; grid-template-columns:1fr 1.4fr 92px; gap:10px; align-items:center"><input placeholder="KEY" style="{{ s.inputMono }}"/><input placeholder="value" style="{{ s.inputMono }}"/><label style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); cursor:pointer"><input type="checkbox" style="accent-color:var(--accent)"/>Secret</label></div>
        </div>
        <div style="display:flex; align-items:center; justify-content:space-between">
          <button style="display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:8px; border:1px dashed var(--border-strong); background:transparent; color:var(--text-muted); font-size:12.5px; font-weight:500; cursor:pointer; font-family:inherit" style-hover="{color:'var(--text)', borderColor:'var(--text-muted)'}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>Add variable</button>
          <div style="display:flex; gap:8px"><button onClick="{{ toggleCreate }}" style="{{ s.btnGhost }}" style-hover="{background:'var(--surface-2)'}">Cancel</button><button onClick="{{ toggleCreate }}" style="{{ s.btnPrimary }}" style-hover="{background:'var(--accent-hover)'}">Create group</button></div>
        </div>
      </div>
    </sc-if>

    <div style="display:flex; flex-direction:column; gap:13px">
      <sc-for list="{{ groups }}" as="g" hint-placeholder-count="4">
        <div style="border:1px solid var(--border); border-radius:13px; background:var(--surface); box-shadow:var(--shadow); overflow:visible">
          <div role="button" onClick="{{ g.toggle }}" style="display:flex; align-items:center; justify-content:space-between; gap:14px; padding:15px 18px; cursor:pointer">
            <div style="display:flex; align-items:center; gap:11px; min-width:0">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="{{ g.chevron }}"><path d="m9 18 6-6-6-6"/></svg>
              <span style="width:30px; height:30px; border-radius:8px; background:var(--accent-soft); display:flex; align-items:center; justify-content:center; flex-shrink:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent-text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H7a2 2 0 0 0-2 2v5a2 2 0 0 1-2 2 2 2 0 0 1 2 2v5a2 2 0 0 0 2 2h1"/><path d="M16 3h1a2 2 0 0 1 2 2v5a2 2 0 0 0 2 2 2 2 0 0 0-2 2v5a2 2 0 0 1-2 2h-1"/></svg></span>
              <span style="font-family:'Geist Mono',monospace; font-size:14px; font-weight:600; color:var(--text)">{{ g.name }}</span>
              <span style="{{ g.scopeBadge }}">{{ g.scope }}</span>
              <span style="font-size:12px; color:var(--text-muted)">{{ g.varCount }} variables</span>
              <sc-if value="{{ g.hasSecret }}" hint-placeholder-val="{{ false }}"><span style="display:inline-flex; align-items:center; gap:4px; font-size:11px; color:var(--text-muted)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>secrets</span></sc-if>
            </div>
            <span style="font-size:12.5px; color:var(--text-muted); white-space:nowrap">Attached to {{ g.assignedCount }} services</span>
          </div>

          <sc-if value="{{ g.expanded }}" hint-placeholder-val="{{ false }}">
            <div style="padding:0 18px 18px">
              <div style="border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:16px">
                <div style="display:grid; grid-template-columns:1fr 1.5fr 80px; gap:12px; padding:8px 14px; background:var(--surface-2); border-bottom:1px solid var(--border); font-size:10.5px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--text-muted)"><span>Key</span><span>Value</span><span></span></div>
                <sc-for list="{{ g.vars }}" as="v" hint-placeholder-count="3">
                  <div style="display:grid; grid-template-columns:1fr 1.5fr 80px; gap:12px; padding:9px 14px; border-bottom:1px solid var(--border); align-items:center">
                    <span style="font-family:'Geist Mono',monospace; font-size:12px; font-weight:500; color:var(--text)">{{ v.key }}</span>
                    <span style="font-family:'Geist Mono',monospace; font-size:12px; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap">{{ v.shown }}</span>
                    <div style="display:flex; justify-content:flex-end">
                      <sc-if value="{{ v.secret }}" hint-placeholder-val="{{ false }}"><span style="font-size:10px; font-weight:600; color:var(--warn-text); background:var(--warn-soft); padding:2px 7px; border-radius:999px">secret</span></sc-if>
                    </div>
                  </div>
                </sc-for>
              </div>

              <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:14px; flex-wrap:wrap">
                <div style="flex:1; min-width:240px">
                  <div style="font-size:11.5px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:9px">Attached to services</div>
                  <div style="display:flex; flex-wrap:wrap; gap:7px; align-items:center; position:relative">
                    <sc-for list="{{ g.chips }}" as="c" hint-placeholder-count="3">
                      <span style="display:inline-flex; align-items:center; gap:7px; padding:4px 6px 4px 10px; border-radius:999px; background:var(--surface-2); border:1px solid var(--border); font-size:12px; font-weight:500; color:var(--text)"><span style="width:6px; height:6px; border-radius:50%; background:var(--ok)"></span>{{ c.svc }}<button onClick="{{ c.remove }}" style="width:16px; height:16px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:var(--text-muted); cursor:pointer; border-radius:50%; padding:0" style-hover="{background:'var(--err-soft)', color:'var(--err-text)'}"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></span>
                    </sc-for>
                    <div style="position:relative">
                      <button onClick="{{ g.openAssign }}" style="display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:999px; border:1px dashed var(--border-strong); background:transparent; color:var(--accent-text); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit" style-hover="{background:'var(--accent-soft)', borderColor:'var(--accent)'}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>Assign to service</button>
                      <sc-if value="{{ g.assignOpen }}" hint-placeholder-val="{{ false }}">
                        <div style="position:absolute; top:100%; left:0; margin-top:6px; width:230px; background:var(--surface); border:1px solid var(--border); border-radius:11px; box-shadow:var(--shadow-lg); padding:6px; z-index:30; max-height:240px; overflow-y:auto">
                          <sc-for list="{{ g.assignList }}" as="a" hint-placeholder-count="6">
                            <div role="button" onClick="{{ a.on }}" style="display:flex; align-items:center; justify-content:space-between; gap:8px; padding:7px 9px; border-radius:7px; cursor:pointer; font-size:12.5px; color:var(--text)" style-hover="{background:'var(--surface-2)'}"><span style="font-family:'Geist Mono',monospace">{{ a.svc }}</span><sc-if value="{{ a.checked }}" hint-placeholder-val="{{ false }}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></sc-if></div>
                          </sc-for>
                        </div>
                      </sc-if>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </sc-if>
        </div>
      </sc-for>
    </div>
  </div>
</dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:820},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  allServices = ['api-gateway','web-storefront','checkout-svc','image-proxy','analytics-api','worker-billing','notify-svc','docs-site'];

  state = {
    reveal:false, creating:false,
    expanded:{ 'shared-prod':true },
    assignOpen:null,
    assigned:{
      'shared-prod':['api-gateway','web-storefront','worker-billing'],
      'stripe-keys':['api-gateway','checkout-svc'],
      'postgres-mflh':['api-gateway','worker-billing'],
      'redis-shared':['api-gateway','web-storefront']
    }
  };

  toggleAssign(gid, svc){
    this.setState(st => {
      const cur = st.assigned[gid] || [];
      const next = cur.includes(svc) ? cur.filter(x=>x!==svc) : [...cur, svc];
      return { assigned: { ...st.assigned, [gid]: next } };
    });
  }

  renderVals(){
    const theme = this.props.theme || 'light';
    const reveal = this.state.reveal;
    const s = {
      btnPrimary:{ display:'inline-flex', alignItems:'center', gap:'7px', padding:'9px 15px', borderRadius:'9px', border:'1px solid var(--accent)', background:'var(--accent)', color:'var(--accent-contrast)', fontSize:'13.5px', fontWeight:600, cursor:'pointer', fontFamily:'inherit', boxShadow:'var(--shadow)', whiteSpace:'nowrap' },
      btnSecondary:{ display:'inline-flex', alignItems:'center', gap:'7px', padding:'9px 14px', borderRadius:'9px', border:'1px solid var(--border-strong)', background:'var(--surface)', color:'var(--text)', fontSize:'13px', fontWeight:600, cursor:'pointer', fontFamily:'inherit', whiteSpace:'nowrap' },
      btnGhost:{ padding:'9px 14px', borderRadius:'9px', border:'1px solid transparent', background:'transparent', color:'var(--text)', fontSize:'13px', fontWeight:600, cursor:'pointer', fontFamily:'inherit' },
      label:{ display:'block', fontSize:'12px', fontWeight:600, color:'var(--text-muted)', marginBottom:'6px' },
      inputMono:{ width:'100%', padding:'8px 11px', borderRadius:'8px', border:'1px solid var(--border)', background:'var(--surface)', color:'var(--text)', fontSize:'12.5px', fontFamily:"'Geist Mono',monospace", outline:'none', boxSizing:'border-box' },
      select:{ width:'100%', appearance:'none', WebkitAppearance:'none', padding:'8px 30px 8px 11px', borderRadius:'8px', border:'1px solid var(--border)', background:'var(--surface)', color:'var(--text)', fontSize:'13px', fontFamily:'inherit', cursor:'pointer', outline:'none', boxSizing:'border-box' }
    };

    const scopeBadge = (scope) => scope==='Global'
      ? { display:'inline-flex', alignItems:'center', padding:'2px 9px', borderRadius:'999px', background:'var(--neutral-soft)', color:'var(--neutral-text)', fontSize:'11px', fontWeight:600 }
      : { display:'inline-flex', alignItems:'center', padding:'2px 9px', borderRadius:'999px', background:'var(--accent-soft)', color:'var(--accent-text)', fontSize:'11px', fontWeight:600 };

    const defs = [
      { id:'shared-prod', scope:'Global', vars:[['SENTRY_DSN','https://3f8a@o91.ingest.sentry.io/42',false],['LOG_LEVEL','info',false],['OTEL_EXPORTER','http://otel.internal:4317',false]] },
      { id:'stripe-keys', scope:'Project: mflh', vars:[['STRIPE_SECRET_KEY','sk_live_51Kj2aBxQp7Lm0Tz',true],['STRIPE_WEBHOOK_SECRET','whsec_9f3e8c1a2b4d',true]] },
      { id:'postgres-mflh', scope:'Project: mflh', vars:[['DATABASE_URL','postgres://app:Xz9f2@db-mflh-pg.internal:5432/app',true],['PGSSLMODE','require',false]] },
      { id:'redis-shared', scope:'Global', vars:[['REDIS_URL','redis://:a83Kd@cache-mflh.internal:6379',true]] }
    ];

    const groups = defs.map(d => {
      const assigned = this.state.assigned[d.id] || [];
      const expanded = !!this.state.expanded[d.id];
      const assignOpen = this.state.assignOpen === d.id;
      return {
        name:d.id, scope:d.scope, scopeBadge:scopeBadge(d.scope),
        varCount:d.vars.length, hasSecret:d.vars.some(v=>v[2]),
        assignedCount:assigned.length,
        expanded, assignOpen,
        chevron:{ transition:'transform .15s', transform: expanded ? 'rotate(90deg)' : 'rotate(0deg)' },
        vars:d.vars.map(([key,val,secret]) => ({ key, secret, shown: (secret && !reveal) ? '•'.repeat(Math.min(val.length,24)) : val })),
        chips: assigned.map(svc => ({ svc, remove:(e)=>{ if(e&&e.stopPropagation)e.stopPropagation(); this.toggleAssign(d.id, svc); } })),
        assignList: this.allServices.map(svc => ({ svc, checked:assigned.includes(svc), on:(e)=>{ if(e&&e.stopPropagation)e.stopPropagation(); this.toggleAssign(d.id, svc); } })),
        toggle:()=>this.setState(st=>({ expanded:{ ...st.expanded, [d.id]:!st.expanded[d.id] }, assignOpen:null })),
        openAssign:(e)=>{ if(e&&e.stopPropagation)e.stopPropagation(); this.setState(st=>({ assignOpen: st.assignOpen===d.id ? null : d.id })); }
      };
    });

    return {
      theme, s, groups,
      reveal, revealLabel: reveal ? 'Hide values' : 'Reveal values',
      toggleReveal:()=>this.setState(st=>({ reveal:!st.reveal })),
      creating:this.state.creating, toggleCreate:()=>this.setState(st=>({ creating:!st.creating }))
    };
  }
}
</script>
</body>
</html>
