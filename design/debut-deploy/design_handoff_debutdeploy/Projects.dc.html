<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<dc-import name="AppShell" active-nav="projects" crumb="Projects" theme="{{ theme }}" hint-size="100%,820px">
  <div style="position:relative; min-height:708px">
    <div style="padding:26px 30px 40px; max-width:1000px">

      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:20px; margin-bottom:8px">
        <div>
          <h1 style="margin:0 0 4px; font-family:'Geist',sans-serif; font-size:25px; font-weight:600; letter-spacing:-.01em; color:var(--text)">Projects</h1>
          <p style="margin:0; font-size:13.5px; color:var(--text-muted)">Group services, databases and servers into isolated environments.</p>
        </div>
        <button onClick="{{ openModal }}" style="{{ s.btnPrimary }}" style-hover="{background:'var(--accent-hover)', borderColor:'var(--accent-hover)'}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>New Project
        </button>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:22px">
        <sc-for list="{{ projects }}" as="p" hint-placeholder-count="4">
          <div style="display:flex; flex-direction:column; gap:14px; padding:18px 19px; background:var(--surface); border:1px solid var(--border); border-radius:14px; cursor:pointer; transition:transform .15s, box-shadow .15s, border-color .15s; box-shadow:var(--shadow)" style-hover="{transform:'translateY(-2px)', boxShadow:'var(--shadow-lg)', borderColor:'var(--border-strong)'}">
            <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:10px">
              <div style="display:flex; align-items:center; gap:12px; min-width:0">
                <span style="{{ p.tileStyle }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2.5h8a2 2 0 0 1 2 2V18a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></span>
                <div style="min-width:0">
                  <div style="font-size:15.5px; font-weight:600; color:var(--text); letter-spacing:-.005em">{{ p.name }}</div>
                  <span style="{{ p.envBadge }}">{{ p.envLabel }}</span>
                </div>
              </div>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0; margin-top:3px"><path d="m9 18 6-6-6-6"/></svg>
            </div>

            <p style="margin:0; font-size:13px; color:var(--text-muted); line-height:1.5">{{ p.desc }}</p>

            <div style="display:flex; align-items:center; gap:16px; padding:4px 0 2px">
              <span style="display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg><strong style="font-weight:600">{{ p.services }}</strong> services</span>
              <span style="display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg><strong style="font-weight:600">{{ p.databases }}</strong> databases</span>
              <span style="display:inline-flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="7" rx="2"/><rect x="2" y="13" width="20" height="7" rx="2"/><path d="M6 7.5h.01M6 16.5h.01"/></svg><strong style="font-weight:600">{{ p.servers }}</strong> servers</span>
            </div>

            <div style="height:1px; background:var(--border)"></div>
            <div style="display:flex; align-items:center; justify-content:space-between">
              <div style="display:flex; align-items:center">
                <sc-for list="{{ p.members }}" as="m" hint-placeholder-count="3">
                  <span style="{{ m.style }}">{{ m.initials }}</span>
                </sc-for>
              </div>
              <span style="font-size:12px; color:var(--text-muted)">Updated {{ p.updated }}</span>
            </div>
          </div>
        </sc-for>
      </div>
    </div>

    <sc-if value="{{ modalOpen }}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute; inset:0; background:rgba(10,12,17,.45); backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px); display:flex; align-items:flex-start; justify-content:center; padding-top:64px; z-index:50">
        <div style="width:440px; max-width:calc(100% - 40px); background:var(--surface); border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow-lg); overflow:hidden">
          <div style="display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--border)">
            <h3 style="margin:0; font-family:'Geist',sans-serif; font-size:16.5px; font-weight:600; color:var(--text)">New project</h3>
            <button onClick="{{ closeModal }}" style="width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:7px; border:none; background:transparent; color:var(--text-muted); cursor:pointer" style-hover="{background:'var(--surface-2)', color:'var(--text)'}"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
          </div>
          <div style="padding:20px 22px; display:flex; flex-direction:column; gap:17px">
            <div>
              <label style="{{ s.label }}">Project name</label>
              <input placeholder="e.g. mobile-backend" style="{{ s.input }}" style-focus="{borderColor:'var(--accent)', boxShadow:'0 0 0 3px var(--ring)'}"/>
            </div>
            <div>
              <label style="{{ s.label }}">Color</label>
              <div style="display:flex; gap:9px">
                <sc-for list="{{ swatches }}" as="sw" hint-placeholder-count="6">
                  <span role="button" onClick="{{ sw.on }}" style="{{ sw.style }}"></span>
                </sc-for>
              </div>
            </div>
            <div>
              <label style="{{ s.label }}">Description</label>
              <input placeholder="What lives in this project?" style="{{ s.input }}" style-focus="{borderColor:'var(--accent)', boxShadow:'0 0 0 3px var(--ring)'}"/>
            </div>
            <div>
              <label style="{{ s.label }}">Environment</label>
              <div style="display:flex; gap:2px; padding:3px; border:1px solid var(--border); border-radius:9px; background:var(--surface-2); width:fit-content">
                <button onClick="{{ setProd }}" style="{{ envProdBtn }}">Production</button>
                <button onClick="{{ setStaging }}" style="{{ envStagingBtn }}">Staging</button>
              </div>
            </div>
          </div>
          <div style="display:flex; justify-content:flex-end; gap:9px; padding:16px 22px; border-top:1px solid var(--border); background:var(--surface-2)">
            <button onClick="{{ closeModal }}" style="{{ s.btnGhost }}" style-hover="{background:'var(--surface)'}">Cancel</button>
            <button onClick="{{ closeModal }}" style="{{ s.btnPrimary }}" style-hover="{background:'var(--accent-hover)'}">Create project</button>
          </div>
        </div>
      </div>
    </sc-if>
  </div>
</dc-import>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:820},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { modalOpen:false, color:0, env:'prod' };

  renderVals(){
    const theme = this.props.theme || 'light';
    const s = {
      btnPrimary:{ display:'inline-flex', alignItems:'center', gap:'7px', padding:'9px 15px', borderRadius:'9px', border:'1px solid var(--accent)', background:'var(--accent)', color:'var(--accent-contrast)', fontSize:'13.5px', fontWeight:600, cursor:'pointer', fontFamily:'inherit', boxShadow:'var(--shadow)', whiteSpace:'nowrap' },
      btnGhost:{ display:'inline-flex', alignItems:'center', gap:'7px', padding:'9px 15px', borderRadius:'9px', border:'1px solid transparent', background:'transparent', color:'var(--text)', fontSize:'13.5px', fontWeight:600, cursor:'pointer', fontFamily:'inherit' },
      label:{ display:'block', fontSize:'12px', fontWeight:600, color:'var(--text-muted)', marginBottom:'6px' },
      input:{ width:'100%', padding:'9px 12px', borderRadius:'9px', border:'1px solid var(--border)', background:'var(--surface)', color:'var(--text)', fontSize:'13.5px', fontFamily:'inherit', outline:'none', boxSizing:'border-box' }
    };

    const grads = ['linear-gradient(135deg,#6366f1,#2563eb)','linear-gradient(135deg,#0ea5e9,#0d9488)','linear-gradient(135deg,#f59e0b,#ef4444)','linear-gradient(135deg,#ec4899,#8b5cf6)','linear-gradient(135deg,#10b981,#059669)'];
    const avatar = (initials,i) => ({ initials, style:{ width:'26px', height:'26px', borderRadius:'50%', background:grads[i%grads.length], color:'#fff', fontSize:'10px', fontWeight:600, display:'flex', alignItems:'center', justifyContent:'center', border:'2px solid var(--surface)', marginLeft:i===0?'0':'-8px', flexShrink:0 } });
    const tile = (c) => ({ width:'40px', height:'40px', borderRadius:'11px', background:c, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, boxShadow:'0 2px 6px -1px '+c+'66' });
    const envBadge = (env) => env==='prod'
      ? { display:'inline-block', marginTop:'4px', padding:'2px 8px', borderRadius:'999px', background:'var(--ok-soft)', color:'var(--ok-text)', fontSize:'10.5px', fontWeight:600 }
      : { display:'inline-block', marginTop:'4px', padding:'2px 8px', borderRadius:'999px', background:'var(--warn-soft)', color:'var(--warn-text)', fontSize:'10.5px', fontWeight:600 };

    const raw = [
      { name:'mflh', color:'#2563eb', env:'prod', desc:'Customer storefront, checkout and order APIs.', services:5, databases:2, servers:2, members:['MF','OH','RK'], updated:'7m ago' },
      { name:'internal-tools', color:'#8b5cf6', env:'staging', desc:'Back-office dashboards and admin panels.', services:2, databases:1, servers:1, members:['MF','Lu'], updated:'2h ago' },
      { name:'data-platform', color:'#d9822b', env:'prod', desc:'ETL pipelines, analytics API and warehouse.', services:3, databases:2, servers:1, members:['RK','OH','MF','Tk'], updated:'1d ago' },
      { name:'marketing-site', color:'#0d9488', env:'prod', desc:'Public marketing site, blog and docs.', services:1, databases:0, servers:1, members:['Lu'], updated:'3d ago' }
    ];
    const projects = raw.map(p => ({ ...p, tileStyle:tile(p.color), envBadge:envBadge(p.env), envLabel:p.env==='prod'?'Production':'Staging', members:p.members.map((m,i)=>avatar(m,i)) }));

    const swColors = ['#2563eb','#8b5cf6','#0d9488','#d9822b','#e11d48','#475569'];
    const swatches = swColors.map((c,i) => ({ on:()=>this.setState({color:i}), style:{ width:'30px', height:'30px', borderRadius:'9px', background:c, cursor:'pointer', boxShadow: this.state.color===i ? '0 0 0 2px var(--surface), 0 0 0 4px '+c : 'none', transition:'box-shadow .12s' } }));

    const seg = (on) => ({ padding:'6px 14px', borderRadius:'7px', border:'none', fontSize:'12.5px', fontWeight:600, cursor:'pointer', fontFamily:'inherit', background: on?'var(--surface)':'transparent', color: on?'var(--text)':'var(--text-muted)', boxShadow: on?'var(--shadow)':'none' });

    return {
      theme, s, projects, swatches,
      modalOpen:this.state.modalOpen,
      openModal:()=>this.setState({modalOpen:true}), closeModal:()=>this.setState({modalOpen:false}),
      envProdBtn:seg(this.state.env==='prod'), envStagingBtn:seg(this.state.env==='staging'),
      setProd:()=>this.setState({env:'prod'}), setStaging:()=>this.setState({env:'staging'})
    };
  }
}
</script>
</body>
</html>
